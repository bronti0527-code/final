<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Rental Admin — Feedbacks</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-logo">CAR<span>RENTAL</span> <small>ADMIN</small></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="snav-item"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="admin-bookings.html" class="snav-item"><i class="fas fa-calendar-check"></i> All Bookings</a>
    <a href="admin-users.html" class="snav-item"><i class="fas fa-users"></i> Users</a>
    <a href="admin-cars.html" class="snav-item"><i class="fas fa-car"></i> Manage Cars</a>
    <a href="admin-feedbacks.html" class="snav-item active"><i class="fas fa-star"></i> Feedbacks</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-profile">
      <div class="ap-avatar">Y</div>
      <div class="ap-info"><span class="ap-name">Yash</span><span class="ap-role">Administrator</span></div>
    </div>
    <button class="sidebar-logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</aside>

<main class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-title"><h1>Customer Feedbacks</h1><p>All feedback submitted by users</p></div>
    </div>
    <div class="topbar-right">
      <select class="admin-select small" id="filterRating" onchange="filterFeedbacks()">
        <option value="">All Ratings</option>
        <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
        <option value="4">⭐⭐⭐⭐ 4 Stars</option>
        <option value="3">⭐⭐⭐ 3 Stars</option>
        <option value="2">⭐⭐ 2 Stars</option>
        <option value="1">⭐ 1 Star</option>
      </select>
      <select class="admin-select small" id="filterStatus" onchange="filterFeedbacks()">
        <option value="">All Status</option>
        <option value="new">New</option>
        <option value="reviewed">Reviewed</option>
      </select>
      <input type="text" class="search-input" id="fbSearch" placeholder="Search feedbacks..." oninput="filterFeedbacks()" style="width:200px;"/>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);" id="fbStats"></div>

  <!-- RATING OVERVIEW -->
  <div class="admin-card" style="margin-top:24px;">
    <div class="card-head"><h3><i class="fas fa-chart-bar"></i> Rating Overview</h3></div>
    <div class="rating-overview" id="ratingOverview"></div>
  </div>

  <!-- FEEDBACKS LIST -->
  <div class="admin-card" style="margin-top:0;">
    <div class="card-head">
      <h3><i class="fas fa-comments"></i> All Feedbacks <span id="fbCount" style="color:var(--gray);font-size:0.85rem;font-weight:400;margin-left:8px;"></span></h3>
      <div style="display:flex;gap:8px;">
        <button class="btn-primary small" onclick="markAllReviewed()"><i class="fas fa-check-double"></i> Mark All Reviewed</button>
        <button class="btn-outline small" onclick="exportFeedbacks()"><i class="fas fa-download"></i> Export</button>
      </div>
    </div>
    <div id="feedbacksContainer"></div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div id="fbDetailModal" class="modal-overlay hidden">
  <div class="admin-modal" style="min-width:560px;max-width:680px;">
    <h3>Feedback Details</h3>
    <div id="fbDetailContent" style="margin-top:16px;"></div>
    <div class="modal-btns">
      <button class="btn-primary" id="fbMarkBtn" onclick="markCurrentReviewed()"><i class="fas fa-check"></i> Mark as Reviewed</button>
      <button class="btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
  let allFeedbacks = [];
  let currentFbId  = null;

  function loadFeedbacks() {
    allFeedbacks = JSON.parse(localStorage.getItem('carrental_feedbacks') || '[]');

    // Stats
    const total    = allFeedbacks.length;
    const newCount = allFeedbacks.filter(f => f.status === 'new').length;
    const reviewed = allFeedbacks.filter(f => f.status === 'reviewed').length;
    const avgRating = total ? (allFeedbacks.reduce((s,f) => s + f.rating, 0) / total).toFixed(1) : '0.0';
    const recommend = total ? Math.round(allFeedbacks.filter(f => f.recommend === 'yes').length / total * 100) : 0;

    document.getElementById('fbStats').innerHTML = `
      <div class="stat-card blue"><div class="stat-icon"><i class="fas fa-comments"></i></div><div class="stat-info"><span class="stat-num">${total}</span><span class="stat-label">Total Feedbacks</span></div></div>
      <div class="stat-card red"><div class="stat-icon"><i class="fas fa-bell"></i></div><div class="stat-info"><span class="stat-num">${newCount}</span><span class="stat-label">New / Unread</span></div></div>
      <div class="stat-card green"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><span class="stat-num">${reviewed}</span><span class="stat-label">Reviewed</span></div></div>
      <div class="stat-card gold"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-info"><span class="stat-num">${avgRating}</span><span class="stat-label">Avg Rating</span></div></div>
      <div class="stat-card blue" style="border-left-color:#2ec4b6"><div class="stat-icon" style="background:rgba(46,196,182,0.15);color:#2ec4b6"><i class="fas fa-thumbs-up"></i></div><div class="stat-info"><span class="stat-num">${recommend}%</span><span class="stat-label">Would Recommend</span></div></div>`;

    // Rating overview bars
    const counts = [5,4,3,2,1].map(r => allFeedbacks.filter(f => f.rating === r).length);
    document.getElementById('ratingOverview').innerHTML = [5,4,3,2,1].map((r,i) => {
      const c   = counts[i];
      const pct = total ? Math.round(c / total * 100) : 0;
      const color = r >= 4 ? '#2ec4b6' : r === 3 ? '#f4a261' : '#e63946';
      return `<div class="ro-row">
        <span class="ro-label">${'★'.repeat(r)} ${r} star${r>1?'s':''}</span>
        <div class="ro-bar"><div class="ro-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="ro-count">${c} (${pct}%)</span>
      </div>`;
    }).join('');

    filterFeedbacks();
  }

  function filterFeedbacks() {
    const rating = document.getElementById('filterRating').value;
    const status = document.getElementById('filterStatus').value;
    const q      = document.getElementById('fbSearch').value.toLowerCase();

    let filtered = [...allFeedbacks].sort((a,b) => new Date(b.date) - new Date(a.date));
    if (rating) filtered = filtered.filter(f => f.rating === parseInt(rating));
    if (status) filtered = filtered.filter(f => f.status === status);
    if (q)      filtered = filtered.filter(f =>
      f.title.toLowerCase().includes(q) ||
      f.message.toLowerCase().includes(q) ||
      f.userName.toLowerCase().includes(q) ||
      (f.car||'').toLowerCase().includes(q)
    );

    document.getElementById('fbCount').textContent = `(${filtered.length} feedbacks)`;
    const container = document.getElementById('feedbacksContainer');

    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:48px;color:var(--gray)"><i class="fas fa-comment-slash" style="font-size:2.5rem;opacity:0.3;display:block;margin-bottom:12px"></i><p>No feedbacks found</p></div>`;
      return;
    }

    container.innerHTML = filtered.map(f => `
      <div class="fb-admin-card ${f.status === 'new' ? 'fb-new' : ''}">
        <div class="fac-left">
          <div class="fac-avatar">${(f.userName||'U').charAt(0).toUpperCase()}</div>
          <div class="fac-info">
            <div class="fac-top">
              <strong>${f.userName}</strong>
              <div class="fac-stars">${renderStars(f.rating)}</div>
              ${f.status === 'new' ? '<span class="fb-new-badge">NEW</span>' : '<span class="fb-reviewed-badge">REVIEWED</span>'}
            </div>
            <h4 class="fac-title">${f.title}</h4>
            <p class="fac-msg">${f.message.length > 120 ? f.message.slice(0,120) + '...' : f.message}</p>
            <div class="fac-meta">
              <span><i class="fas fa-car"></i> ${f.car || 'General'}</span>
              <span><i class="fas fa-calendar"></i> ${new Date(f.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
              <span><i class="fas fa-thumbs-${f.recommend === 'yes' ? 'up' : 'down'}" style="color:${f.recommend === 'yes' ? '#2ec4b6' : '#e63946'}"></i> ${f.recommend === 'yes' ? 'Recommends' : 'Does not recommend'}</span>
              ${f.bookingId ? `<span><i class="fas fa-hashtag"></i> ${f.bookingId}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="fac-actions">
          <button class="action-btn view" onclick="viewFeedback('${f.id}')" title="View Full"><i class="fas fa-eye"></i></button>
          ${f.status === 'new' ? `<button class="action-btn edit" onclick="markReviewed('${f.id}')" title="Mark Reviewed"><i class="fas fa-check"></i></button>` : ''}
          <button class="action-btn delete" onclick="deleteFeedback('${f.id}')" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>`).join('');
  }

  function renderStars(r) {
    return `<span style="color:#f4a261;letter-spacing:2px">${'★'.repeat(r)}${'☆'.repeat(5-r)}</span>`;
  }

  function viewFeedback(id) {
    const f = allFeedbacks.find(x => x.id === id);
    if (!f) return;
    currentFbId = id;
    const btn = document.getElementById('fbMarkBtn');
    btn.style.display = f.status === 'reviewed' ? 'none' : 'flex';

    document.getElementById('fbDetailContent').innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);">
        <div style="width:48px;height:48px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0;">${(f.userName||'U').charAt(0).toUpperCase()}</div>
        <div>
          <strong style="font-size:1rem;">${f.userName}</strong>
          <p style="font-size:0.8rem;color:var(--gray);margin-top:2px;">${f.userEmail || ''}</p>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-size:1.4rem;color:#f4a261;letter-spacing:3px">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</div>
          <small style="color:var(--gray)">${f.rating}/5 stars</small>
        </div>
      </div>
      <h4 style="margin-bottom:10px;font-size:1.1rem;">"${f.title}"</h4>
      <p style="color:var(--gray2);line-height:1.7;margin-bottom:20px;font-size:0.92rem;">${f.message}</p>
      ${f.catVehicle || f.catService || f.catValue || f.catBooking ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        ${f.catVehicle  ? `<div class="modal-info-row"><span>Vehicle Condition</span><strong style="color:#f4a261">${'★'.repeat(f.catVehicle)}</strong></div>` : ''}
        ${f.catService  ? `<div class="modal-info-row"><span>Customer Service</span><strong style="color:#f4a261">${'★'.repeat(f.catService)}</strong></div>` : ''}
        ${f.catValue    ? `<div class="modal-info-row"><span>Value for Money</span><strong style="color:#f4a261">${'★'.repeat(f.catValue)}</strong></div>` : ''}
        ${f.catBooking  ? `<div class="modal-info-row"><span>Booking Process</span><strong style="color:#f4a261">${'★'.repeat(f.catBooking)}</strong></div>` : ''}
      </div>` : ''}
      <div class="modal-info-row"><span>Vehicle</span><strong>${f.car || 'General'}</strong></div>
      ${f.bookingId ? `<div class="modal-info-row"><span>Booking ID</span><strong>${f.bookingId}</strong></div>` : ''}
      <div class="modal-info-row"><span>Submitted</span><strong>${new Date(f.date).toLocaleString('en-IN')}</strong></div>
      <div class="modal-info-row"><span>Would Recommend</span><strong style="color:${f.recommend==='yes'?'#2ec4b6':'#e63946'}">${f.recommend==='yes'?'✅ Yes':'❌ No'}</strong></div>
      <div class="modal-info-row"><span>Status</span><strong>${f.status === 'reviewed' ? '✅ Reviewed' : '🕐 Pending Review'}</strong></div>`;

    document.getElementById('fbDetailModal').classList.remove('hidden');
  }

  function markCurrentReviewed() {
    if (currentFbId) { markReviewed(currentFbId); closeModal(); }
  }

  function markReviewed(id) {
    allFeedbacks = allFeedbacks.map(f => f.id === id ? {...f, status:'reviewed'} : f);
    localStorage.setItem('carrental_feedbacks', JSON.stringify(allFeedbacks));
    showToast('Feedback marked as reviewed.');
    loadFeedbacks();
  }

  function markAllReviewed() {
    allFeedbacks = allFeedbacks.map(f => ({...f, status:'reviewed'}));
    localStorage.setItem('carrental_feedbacks', JSON.stringify(allFeedbacks));
    showToast('All feedbacks marked as reviewed.');
    loadFeedbacks();
  }

  function deleteFeedback(id) {
    if (!confirm('Delete this feedback?')) return;
    allFeedbacks = allFeedbacks.filter(f => f.id !== id);
    localStorage.setItem('carrental_feedbacks', JSON.stringify(allFeedbacks));
    showToast('Feedback deleted.');
    loadFeedbacks();
  }

  function exportFeedbacks() {
    const headers = ['ID','User','Email','Car','Title','Message','Rating','Recommend','Date','Status'];
    const rows = allFeedbacks.map(f => [f.id, f.userName, f.userEmail, f.car, `"${f.title}"`, `"${f.message.replace(/"/g,'""')}"`, f.rating, f.recommend, f.date, f.status]);
    const csv  = [headers, ...rows].map(r => r.join(',')).join('\n');
    const a    = document.createElement('a');
    a.href     = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'feedbacks.csv';
    a.click();
  }

  function closeModal() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
  }

  loadFeedbacks();
</script>
</body>
</html>
