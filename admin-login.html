<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Rental Admin — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">

<div class="admin-login-wrap">
  <div class="admin-login-box">
    <div class="admin-login-header">
      <div class="admin-logo">CAR<span>RENTAL</span></div>
      <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Portal</div>
      <h2>Admin Sign In</h2>
      <p>Restricted access — authorized personnel only</p>
    </div>

    <div class="auth-form" style="margin-top:28px;">
      <div class="field-group">
        <label>Admin Email</label>
        <div class="field-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="adminEmail" placeholder="admin@carrental.in"/>
        </div>
      </div>
      <div class="field-group">
        <label>Password</label>
        <div class="field-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="adminPwd" placeholder="Admin password"/>
          <i class="fas fa-eye toggle-eye" onclick="togglePwd('adminPwd', this)"></i>
        </div>
      </div>
      <div class="msg error-msg" id="adminErr"></div>
      <button class="btn-primary full" onclick="adminLogin()" style="margin-top:8px;">
        Access Dashboard <i class="fas fa-arrow-right"></i>
      </button>
      <p style="text-align:center;margin-top:16px;font-size:0.83rem;">
        <a href="index.html" style="color:var(--gray)"><i class="fas fa-arrow-left"></i> Back to User Site</a>
      </p>
    </div>
  </div>
</div>

<script>
  // If already admin logged in, redirect
  if (localStorage.getItem('carrental_admin')) window.location.href = 'admin-dashboard.html';

  const ADMIN_CREDENTIALS = { email: 'yash27@gmail.com', password: 'yash0527' };

  function togglePwd(id, icon) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
  }

  function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pwd   = document.getElementById('adminPwd').value;
    const err   = document.getElementById('adminErr');
    err.style.display = 'none';

    if (!email || !pwd) { err.textContent = 'Please enter email and password.'; err.style.display = 'block'; return; }
    if (email !== ADMIN_CREDENTIALS.email || pwd !== ADMIN_CREDENTIALS.password) {
      err.textContent = 'Invalid admin credentials.'; err.style.display = 'block'; return;
    }

    localStorage.setItem('carrental_admin', JSON.stringify({ email, name: 'Yash', loginTime: new Date().toISOString() }));
    window.location.href = 'admin-dashboard.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
